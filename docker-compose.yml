services:
  new-api:
    image: new-api:20260409
    platform: linux/amd64
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=root:Abc123456@tcp(mysql:3306)/newapi_prod?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_CONN_STRING=redis://redis:6379
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - SERVER_ADDRESS=https://tokens.aihuige.com
      - PUBLIC_URL=https://tokens.aihuige.com
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Abc123456
      MYSQL_DATABASE: newapi_prod
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "33061:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: redis
    restart: always

volumes:
  mysql_data:
